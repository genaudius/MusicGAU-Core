hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - solver=musicgen/musicgen_base_32khz
    - ++datasource.train=datasets/bachata_stems_v1/manifests/train.enriched.jsonl.gz
    - ++datasource.valid=datasets/bachata_stems_v1/manifests/valid.jsonl.gz
    - ++datasource.evaluate=datasets/bachata_stems_v1/manifests/test.jsonl.gz
    - ++datasource.max_sample_rate=32000
    - ++datasource.max_channels=1
    - optim.lr=0.0001
    - ++dataset.batch_size=4
    - ++schedule.total_updates=5000
    - ++channels=1
    - ++logging.dir=checkpoints/musicgau_bachata
    - ++mp_start_method=spawn
  job:
    name: train
    chdir: null
    override_dirname: ++channels=1,++dataset.batch_size=4,++datasource.evaluate=datasets/bachata_stems_v1/manifests/test.jsonl.gz,++datasource.max_channels=1,++datasource.max_sample_rate=32000,++datasource.train=datasets/bachata_stems_v1/manifests/train.enriched.jsonl.gz,++datasource.valid=datasets/bachata_stems_v1/manifests/valid.jsonl.gz,++logging.dir=checkpoints/musicgau_bachata,++mp_start_method=spawn,++schedule.total_updates=5000,optim.lr=0.0001,solver=musicgen/musicgen_base_32khz
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: C:\Users\genau\MusicGAU\GenAudius_V1
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: C:\Users\genau\gen-audius\audiocraft_repo\config
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      solver: musicgen/musicgen_base_32khz
      model: lm/musicgen_lm
      model/lm/model_scale: small
      solver/musicgen/evaluation: none
      conditioner: text2music
      dset: audio/default
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
device: cuda
dtype: float32
autocast: true
autocast_dtype: float16
seed: 2036
show: false
continue_from: null
execute_only: null
execute_inplace: false
benchmark_no_load: false
efficient_attention_backend: torch
num_threads: 1
mp_start_method: spawn
label: null
logging:
  level: INFO
  log_updates: 10
  log_tensorboard: true
  log_wandb: false
  dir: checkpoints/musicgau_bachata
tensorboard:
  with_media_logging: false
  name: null
  sub_dir: null
wandb:
  with_media_logging: true
  project: null
  name: null
  group: null
slurm:
  gpus: 4
  mem_per_gpu: 40
  time: 3600
  constraint: null
  partition: null
  comment: null
  setup: []
  exclude: ''
dora:
  dir: /checkpoint/${oc.env:USER}/experiments/audiocraft/outputs
  exclude:
  - device
  - wandb.*
  - tensorboard.*
  - logging.*
  - dataset.num_workers
  - eval.num_workers
  - special.*
  - metrics.visqol.bin
  - metrics.fad.bin
  - execute_only
  - execute_best
  - generate.every
  - optim.eager_sync
  - profiler.*
  - deadlock.*
  - efficient_attention_backend
  - num_threads
  - mp_start_method
  use_rendezvous: false
  git_save: true
datasource:
  max_sample_rate: 32000
  max_channels: 1
  train: datasets/bachata_stems_v1/manifests/train.enriched.jsonl.gz
  valid: datasets/bachata_stems_v1/manifests/valid.jsonl.gz
  evaluate: datasets/bachata_stems_v1/manifests/test.jsonl.gz
  generate: null
solver: musicgen
fsdp:
  use: false
  param_dtype: float16
  reduce_dtype: float32
  buffer_dtype: float32
  sharding_strategy: shard_grad_op
  per_block: true
profiler:
  enabled: false
deadlock:
  use: true
  timeout: 600
dataset:
  batch_size: 4
  num_workers: 10
  segment_duration: 30
  num_samples: null
  return_info: true
  shuffle: false
  sample_on_duration: false
  sample_on_weight: false
  min_segment_ratio: 0.8
  train:
    num_samples: 1000000
    shuffle: true
    shuffle_seed: 0
    permutation_on_files: false
    merge_text_p: 0.25
    drop_desc_p: 0.5
    drop_other_p: 0.5
  valid:
    num_samples: 10000
  evaluate:
    num_samples: 10000
  generate:
    num_samples: 50
    return_info: true
checkpoint:
  save_last: true
  save_every: 50
  keep_last: 10
  keep_every_states: null
generate:
  every: 25
  path: samples
  audio:
    format: wav
    strategy: loudness
    sample_rate: ${sample_rate}
    loudness_headroom_db: 14
  lm:
    use_sampling: true
    temp: 1.0
    top_k: 250
    top_p: 0.0
    prompted_samples: true
    unprompted_samples: true
    gen_gt_samples: false
    prompt_duration: null
    gen_duration: null
    remove_prompts: false
  num_workers: 5
evaluate:
  every: 25
  num_workers: 5
  truncate_audio: null
  fixed_generation_duration: null
  metrics:
    base: false
    fad: false
    kld: false
    text_consistency: false
    chroma_cosine: false
optim:
  epochs: 500
  updates_per_epoch: 2000
  lr: 0.0001
  optimizer: dadam
  adam:
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.1
    eps: 1.0e-08
  ema:
    use: true
    updates: 10
    device: cuda
    decay: 0.99
  max_norm: 1.0
  eager_sync: true
schedule:
  lr_scheduler: cosine
  step:
    step_size: null
    gamma: null
  exponential:
    lr_decay: null
  cosine:
    warmup: 4000
    lr_min_ratio: 0.0
    cycle_length: 1.0
  polynomial_decay:
    warmup: null
    zero_lr_warmup_steps: 0
    end_lr: 0.0
    power: 1
  inverse_sqrt:
    warmup: null
    warmup_init_lr: 0.0
  linear_warmup:
    warmup: null
    warmup_init_lr: 0.0
  total_updates: 5000
classifier_free_guidance:
  training_dropout: 0.3
  inference_coef: 3.0
attribute_dropout: {}
fuser:
  cross_attention_pos_emb: false
  cross_attention_pos_emb_scale: 1
  sum: []
  prepend: []
  cross:
  - description
  input_interpolate: []
conditioners:
  description:
    model: t5
    t5:
      name: t5-base
      finetune: false
      word_dropout: 0.3
      normalize_text: false
sample_rate: 32000
channels: 1
compression_model_checkpoint: //pretrained/facebook/encodec_32khz
tokens:
  padding_with_special_token: false
cache:
  path: null
  write: false
  write_shard: 0
  write_num_shards: 1
metrics:
  fad:
    use_gt: false
    model: tf
    tf:
      bin: null
      model_path: //reference/fad/vggish_model.ckpt
  kld:
    use_gt: false
    model: passt
    passt:
      pretrained_length: 20
  text_consistency:
    use_gt: false
    model: clap
    clap:
      model_path: //reference/clap/music_audioset_epoch_15_esc_90.14.pt
      model_arch: HTSAT-base
      enable_fusion: false
  chroma_cosine:
    use_gt: false
    model: chroma_base
    chroma_base:
      sample_rate: ${sample_rate}
      n_chroma: 12
      radix2_exp: 14
      argmax: true
lm_model: transformer_lm
codebooks_pattern:
  modeling: delay
  delay:
    delays:
    - 0
    - 1
    - 2
    - 3
    flatten_first: 0
    empty_initial: 0
  unroll:
    flattening:
    - 0
    - 1
    - 2
    - 3
    delays:
    - 0
    - 0
    - 0
    - 0
  music_lm:
    group_by: 2
  valle:
    delays:
    - 0
    - 0
    - 0
transformer_lm:
  dim: 1024
  num_heads: 16
  num_layers: 24
  hidden_scale: 4
  n_q: 4
  card: 2048
  dropout: 0.0
  emb_lr: null
  activation: gelu
  norm_first: true
  bias_ff: false
  bias_attn: false
  bias_proj: false
  past_context: null
  causal: true
  custom: false
  memory_efficient: true
  attention_as_float32: false
  layer_scale: null
  positional_embedding: sin
  xpos: false
  checkpointing: none
  weight_init: gaussian
  depthwise_init: current
  zero_bias_init: true
  norm: layer_norm
  cross_attention: false
  qk_layer_norm: false
  qk_layer_norm_cross: false
  attention_dropout: null
  kv_repeat: 1
  two_step_cfg: false
