  level: INFO
  log_updates: 10
  log_tensorboard: false
  log_wandb: false
  dir: checkpoints/musicgau_bachata_lora
tensorboard:
  with_media_logging: false
  name: null
  sub_dir: null
wandb:
  with_media_logging: true
  project: null
  name: null
  group: null
slurm:
